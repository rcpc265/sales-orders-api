services:
  postgres:
    image: 'postgres:15-alpine'
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE:-sales_orders_api}'
      POSTGRES_USER: '${DB_USERNAME:-postgres}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
    volumes:
      - 'sales-orders-postgres:/var/lib/postgresql/data'
    networks:
      - sales-orders-network

networks:
  sales-orders-network:
    driver: bridge

volumes:
  sales-orders-postgres:
    driver: local
